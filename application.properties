spring.application.name=pit

spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/pitdb
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=8090

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ─────────────────────────────────────────────────────────────────────
# FIX: Serve static files from BOTH classpath AND the external uploads
# folder so that images saved at runtime are immediately visible.
# The folder "uploads/images/products/" will be created automatically
# by AdminController on first startup.
# ─────────────────────────────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/,file:uploads/