<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product - WoodCraft Furniture Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #imagePreview { display: none; }
        #imagePreview.show { display: block; }
        .drop-zone { border: 2px dashed #d6d3d1; transition: border-color 0.2s, background 0.2s; }
        .drop-zone.dragover { border-color: #b45309; background: #fef3c7; }
    </style>
</head>
<body class="bg-stone-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="flex">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="flex-1 p-6">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-stone-800">➕ Add New Furniture Product</h2>
            <p class="text-stone-500 text-sm mt-1">Fill in the details to add a new furniture item</p>
        </div>

        <div class="max-w-2xl">
            <div class="bg-white rounded-2xl shadow p-7">

                <!-- enctype="multipart/form-data" is REQUIRED for image upload -->
                <form action="/admin/add-product" method="post" enctype="multipart/form-data" class="space-y-5">

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Product Name *</label>
                        <input type="text" name="name" required placeholder="e.g. Teak Wood Sofa Set"
                               class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Category *</label>
                        <select name="category" required
                                class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white">
                            <option value="" disabled selected>-- Select Category --</option>
                            <option value="Sofa & Seating">Sofa &amp; Seating</option>
                            <option value="Beds & Bedroom">Beds &amp; Bedroom</option>
                            <option value="Dining & Kitchen">Dining &amp; Kitchen</option>
                            <option value="Tables & Desks">Tables &amp; Desks</option>
                            <option value="Chairs">Chairs</option>
                            <option value="Wardrobes & Storage">Wardrobes &amp; Storage</option>
                            <option value="Outdoor Furniture">Outdoor Furniture</option>
                            <option value="Office Furniture">Office Furniture</option>
                            <option value="Kids Furniture">Kids Furniture</option>
                            <option value="Decor & Accessories">Decor &amp; Accessories</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-stone-700 text-sm font-semibold mb-1.5">Price (₹) *</label>
                            <input type="number" name="price" required min="0" step="0.01" placeholder="12999"
                                   class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block text-stone-700 text-sm font-semibold mb-1.5">Stock / Inventory *</label>
                            <input type="number" name="stock" required min="0" placeholder="e.g. 25"
                                   class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Description</label>
                        <textarea name="description" rows="4" placeholder="Describe the material, dimensions, colour..."
                                  class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Product Image</label>
                        <div id="dropZone" class="drop-zone rounded-xl p-6 text-center cursor-pointer bg-stone-50"
                             onclick="document.getElementById('imageFile').click()">
                            <div id="dropText">
                                <div class="text-4xl mb-2">🖼️</div>
                                <p class="text-stone-500 text-sm font-medium">Click to upload or drag &amp; drop</p>
                                <p class="text-stone-400 text-xs mt-1">PNG, JPG, WEBP up to 10MB</p>
                            </div>
                            <div id="imagePreview" class="mt-3">
                                <img id="previewImg" src="" alt="Preview"
                                     class="max-h-48 mx-auto rounded-lg object-contain border border-stone-200 shadow-sm">
                                <p id="fileName" class="text-xs text-stone-500 mt-2"></p>
                            </div>
                        </div>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*"
                               class="hidden" onchange="previewImage(this)">
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="submit"
                                class="flex-1 bg-amber-700 text-white py-3 rounded-lg font-semibold hover:bg-amber-800 transition text-sm">
                            ✅ Save Product
                        </button>
                        <a href="/admin/products"
                           class="flex-1 border border-stone-300 text-stone-700 py-3 rounded-lg font-semibold hover:bg-stone-50 transition text-sm text-center">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('fileName').textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
            document.getElementById('imagePreview').classList.add('show');
            document.getElementById('dropText').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
}
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const fileInput = document.getElementById('imageFile');
    fileInput.files = e.dataTransfer.files;
    previewImage(fileInput);
});
</script>

</body>
</html>
