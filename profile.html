<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile - WoodCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="bg-stone-100">

<header style="background: linear-gradient(135deg, #78350f 0%, #92400e 100%);" class="text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3"><span class="text-2xl">🪑</span><span class="text-xl font-bold">WoodCraft</span></div>
            <div class="flex items-center gap-6">
                <a href="/user/shop" class="text-amber-200 hover:text-white text-sm">🛍️ Shop</a>
                <a href="/user/my-orders" class="text-amber-200 hover:text-white text-sm">📦 My Orders</a>
                <a href="/user/profile" class="text-white font-semibold text-sm border-b-2 border-amber-300">👤 Profile</a>
                <a href="/logout" class="bg-white bg-opacity-20 text-white text-sm font-semibold px-4 py-1.5 rounded-lg">Logout</a>
            </div>
        </div>
    </div>
</header>

<div class="max-w-xl mx-auto px-6 py-10">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-stone-800">👤 My Profile</h2>
        <p class="text-stone-500 text-sm mt-1">Your account details</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <div style="background: linear-gradient(135deg, #78350f 0%, #92400e 100%);" class="h-28 flex items-center justify-center">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg">
                <span class="text-4xl">👤</span>
            </div>
        </div>

        <div class="p-8 text-center">
            <h3 class="text-2xl font-bold text-stone-800" th:text="${user.name}">Name</h3>
            <p class="text-stone-500 text-sm mt-1" th:text="${user.email}">email</p>
            <span class="inline-block mt-2 bg-amber-100 text-amber-800 text-xs font-semibold px-3 py-1 rounded-full"
                  th:text="${user.role != null ? user.role : 'USER'}">USER</span>
        </div>

        <div class="px-8 pb-8 space-y-4">
            <div class="bg-stone-50 rounded-xl p-4 flex items-center gap-4">
                <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center text-lg">👤</div>
                <div>
                    <p class="text-xs text-stone-400 font-semibold uppercase tracking-wide">Full Name</p>
                    <p class="text-stone-800 font-semibold text-sm mt-0.5" th:text="${user.name}">Name</p>
                </div>
            </div>
            <div class="bg-stone-50 rounded-xl p-4 flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center text-lg">📧</div>
                <div>
                    <p class="text-xs text-stone-400 font-semibold uppercase tracking-wide">Email Address</p>
                    <p class="text-stone-800 font-semibold text-sm mt-0.5" th:text="${user.email}">email</p>
                </div>
            </div>
            <div class="bg-stone-50 rounded-xl p-4 flex items-center gap-4">
                <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center text-lg">🔑</div>
                <div>
                    <p class="text-xs text-stone-400 font-semibold uppercase tracking-wide">Account Role</p>
                    <p class="text-stone-800 font-semibold text-sm mt-0.5" th:text="${user.role != null ? user.role : 'USER'}">USER</p>
                </div>
            </div>
        </div>

        <div class="px-8 pb-8 flex gap-3">
            <a href="/user/my-orders" class="flex-1 bg-amber-700 text-white py-3 rounded-xl font-semibold text-sm text-center hover:bg-amber-800 transition">📦 My Orders</a>
            <a href="/logout" class="flex-1 border border-stone-300 text-stone-600 py-3 rounded-xl font-semibold text-sm text-center hover:bg-stone-50 transition">🚪 Logout</a>
        </div>
    </div>
</div>

</body>
</html>
