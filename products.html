<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products - WoodCraft Furniture Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="bg-stone-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="flex">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="flex-1 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-2xl font-bold text-stone-800">🪑 Furniture Products</h2>
                <p class="text-stone-500 text-sm mt-1">Manage your furniture inventory</p>
            </div>
            <a href="/admin/add-product"
               class="bg-amber-700 text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-amber-800 transition text-sm">
                ➕ Add Product
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="p-5 border-b border-stone-100">
                <h3 class="text-lg font-bold text-stone-800">📋 All Products</h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-stone-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">Image</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">Product</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">Category</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">Price</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">Stock</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-stone-100">
                        <tr th:each="p : ${products}" class="hover:bg-stone-50 transition">
                            <td class="px-6 py-4 text-sm text-stone-500 font-mono" th:text="${p.id}">1</td>
                            <td class="px-6 py-4">
                                <img th:if="${p.image != null and !#strings.isEmpty(p.image)}"
                                     th:src="${p.image}" alt="Product"
                                     class="w-14 h-14 rounded-lg object-cover border border-stone-200">
                                <div th:unless="${p.image != null and !#strings.isEmpty(p.image)}"
                                     class="w-14 h-14 bg-amber-100 rounded-lg flex items-center justify-center text-2xl">🪑</div>
                            </td>
                            <td class="px-6 py-4">
                                <p class="text-sm font-semibold text-stone-800" th:text="${p.name}">Name</p>
                                <p class="text-xs text-stone-400 max-w-xs truncate" th:text="${p.description}">desc</p>
                            </td>
                            <td class="px-6 py-4">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800"
                                      th:text="${p.category}">Cat</span>
                            </td>
                            <td class="px-6 py-4 text-sm font-semibold text-stone-800">
                                ₹ <span th:text="${p.price}">0</span>
                            </td>
                            <td class="px-6 py-4">
                                <span th:if="${p.stock > 5}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800"
                                      th:text="${p.stock} + ' units'">In Stock</span>
                                <span th:if="${p.stock > 0 and p.stock <= 5}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800"
                                      th:text="${p.stock} + ' units'">Low</span>
                                <span th:if="${p.stock == 0}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Out of Stock</span>
                            </td>
                            <td class="px-6 py-4">
                                <a th:href="@{/admin/edit/{id}(id=${p.id})}"
                                   class="bg-amber-500 text-white text-xs px-3 py-1.5 rounded-lg font-semibold hover:bg-amber-600 transition mr-1">✏️ Edit</a>
                                <a th:href="@{/admin/delete/{id}(id=${p.id})}"
                                   class="bg-red-500 text-white text-xs px-3 py-1.5 rounded-lg font-semibold hover:bg-red-600 transition"
                                   onclick="return confirm('Delete this product?')">🗑️ Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div th:if="${products.isEmpty()}" class="p-12 text-center text-stone-400">
                    <div class="text-5xl mb-3">🪑</div>
                    <h3 class="text-lg font-semibold mb-1">No products yet</h3>
                    <p class="text-sm">Click "Add Product" to get started!</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
