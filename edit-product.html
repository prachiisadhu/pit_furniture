<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product - WoodCraft Furniture Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #imagePreview { display: none; }
        #imagePreview.show { display: block; }
    </style>
</head>
<body class="bg-stone-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="flex">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="flex-1 p-6">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-stone-800">✏️ Edit Product</h2>
            <p class="text-stone-500 text-sm mt-1">Update the details for this furniture item</p>
        </div>

        <div class="max-w-2xl">
            <div class="bg-white rounded-2xl shadow p-7">

                <form action="/admin/update" method="post" enctype="multipart/form-data" class="space-y-5">

                    <input type="hidden" name="id" th:value="${product.id}">
                    <!-- Carry existing image — kept if no new file uploaded -->
                    <input type="hidden" name="image" th:value="${product.image}">

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Product Name *</label>
                        <input type="text" name="name" required th:value="${product.name}"
                               class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Category *</label>
                        <select name="category" required
                                class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white">
                            <option value="" disabled>-- Select Category --</option>
                            <option value="Sofa & Seating" th:selected="${product.category == 'Sofa & Seating'}">Sofa &amp; Seating</option>
                            <option value="Beds & Bedroom" th:selected="${product.category == 'Beds & Bedroom'}">Beds &amp; Bedroom</option>
                            <option value="Dining & Kitchen" th:selected="${product.category == 'Dining & Kitchen'}">Dining &amp; Kitchen</option>
                            <option value="Tables & Desks" th:selected="${product.category == 'Tables & Desks'}">Tables &amp; Desks</option>
                            <option value="Chairs" th:selected="${product.category == 'Chairs'}">Chairs</option>
                            <option value="Wardrobes & Storage" th:selected="${product.category == 'Wardrobes & Storage'}">Wardrobes &amp; Storage</option>
                            <option value="Outdoor Furniture" th:selected="${product.category == 'Outdoor Furniture'}">Outdoor Furniture</option>
                            <option value="Office Furniture" th:selected="${product.category == 'Office Furniture'}">Office Furniture</option>
                            <option value="Kids Furniture" th:selected="${product.category == 'Kids Furniture'}">Kids Furniture</option>
                            <option value="Decor & Accessories" th:selected="${product.category == 'Decor & Accessories'}">Decor &amp; Accessories</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-stone-700 text-sm font-semibold mb-1.5">Price (₹) *</label>
                            <input type="number" name="price" required min="0" step="0.01" th:value="${product.price}"
                                   class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block text-stone-700 text-sm font-semibold mb-1.5">Stock / Inventory *</label>
                            <input type="number" name="stock" required min="0" th:value="${product.stock}"
                                   class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Description</label>
                        <textarea name="description" rows="4" th:text="${product.description}"
                                  class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1.5">Product Image</label>
                        <div th:if="${product.image != null and !#strings.isEmpty(product.image)}" class="mb-3">
                            <p class="text-xs text-stone-500 mb-1">Current image:</p>
                            <img th:src="${product.image}" alt="Current"
                                 class="h-32 rounded-lg object-cover border border-stone-200 shadow-sm">
                        </div>
                        <div id="dropZone" class="border-2 border-dashed border-stone-300 rounded-xl p-5 text-center cursor-pointer bg-stone-50 hover:border-amber-500 transition"
                             onclick="document.getElementById('imageFile').click()">
                            <div id="dropText">
                                <div class="text-3xl mb-1">📁</div>
                                <p class="text-stone-500 text-sm">Click to upload a new image (optional)</p>
                                <p class="text-stone-400 text-xs mt-1">Leave blank to keep existing image</p>
                            </div>
                            <div id="imagePreview" class="mt-3">
                                <img id="previewImg" src="" alt="Preview"
                                     class="max-h-40 mx-auto rounded-lg object-contain border border-stone-200 shadow-sm">
                                <p id="fileName" class="text-xs text-stone-500 mt-2"></p>
                            </div>
                        </div>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*" class="hidden" onchange="previewImage(this)">
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="submit"
                                class="flex-1 bg-amber-700 text-white py-3 rounded-lg font-semibold hover:bg-amber-800 transition text-sm">
                            💾 Update Product
                        </button>
                        <a href="/admin/products"
                           class="flex-1 border border-stone-300 text-stone-700 py-3 rounded-lg font-semibold hover:bg-stone-50 transition text-sm text-center">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('imagePreview').classList.add('show');
            document.getElementById('dropText').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
}
</script>

</body>
</html>
