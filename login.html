<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - WoodCraft Furniture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
        <div class="text-5xl mb-2">🪑</div>
        <h1 class="text-3xl font-bold text-stone-800">WoodCraft</h1>
        <p class="text-stone-500 text-sm mt-1">Premium Furniture Store</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8">
        <h2 class="text-xl font-bold text-stone-800 mb-6 text-center">Welcome Back</h2>

        <form action="/login" method="post" class="space-y-4">
            <div>
                <label class="block text-stone-700 text-sm font-semibold mb-1.5">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com"
                       class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-stone-700 text-sm font-semibold mb-1.5">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full px-4 py-3 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg" th:text="${error}"></div>
            <button type="submit"
                    class="w-full bg-amber-700 text-white py-3 rounded-lg font-semibold hover:bg-amber-800 transition text-sm mt-2">
                Login →
            </button>
        </form>

        <p class="text-center text-stone-500 text-sm mt-6">
            New customer? <a href="/register" class="text-amber-700 font-semibold hover:underline">Create an account</a>
        </p>
    </div>
    <p class="text-center text-stone-400 text-xs mt-6">Admin? Login with your admin credentials.</p>
</div>

</body>
</html>
