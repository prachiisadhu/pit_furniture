<!DOCTYPE html>
<!-- FILE: src/main/resources/templates/user/checkout.html -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout - WoodCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f5f0eb; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<header style="background: linear-gradient(135deg, #1c0f05 0%, #3b1f0a 100%);" class="text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🪑</span>
                <span class="text-xl font-bold">WoodCraft</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="/user/shop" class="text-amber-200 hover:text-white text-sm transition">🛍️ Shop</a>
                <a href="/user/my-orders" class="text-amber-200 hover:text-white text-sm transition">📦 My Orders</a>
                <a href="/user/profile" class="text-amber-200 hover:text-white text-sm transition">👤 Profile</a>
                <a href="/logout" class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white text-sm font-semibold px-4 py-1.5 rounded-lg transition">Logout</a>
            </div>
        </div>
    </div>
</header>

<div class="max-w-3xl mx-auto px-6 py-10">

    <div class="mb-6">
        <p class="text-stone-500 text-sm mb-1">
            <a href="/user/shop" class="hover:text-amber-700">Shop</a> ›
            <a th:href="@{/user/product/{id}(id=${product.id})}" class="hover:text-amber-700" th:text="${product.name}">Product</a> ›
            <span class="font-semibold text-stone-800">Checkout</span>
        </p>
        <h2 class="serif text-2xl font-bold text-stone-800">🛒 Checkout</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- ORDER SUMMARY -->
        <div class="bg-white rounded-2xl shadow p-6">
            <h3 class="serif text-lg font-bold text-stone-800 mb-4">Order Summary</h3>
            <div class="flex items-center gap-4 bg-stone-50 rounded-xl p-4 mb-4">
                <div class="w-16 h-16 rounded-xl overflow-hidden border border-stone-200 flex-shrink-0">
                    <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                         th:src="${product.image}" alt="Product"
                         class="w-full h-full object-cover">
                    <div th:unless="${product.image != null and !#strings.isEmpty(product.image)}"
                         class="w-full h-full bg-amber-100 flex items-center justify-center text-2xl">🪑</div>
                </div>
                <div>
                    <p class="font-bold text-stone-800" th:text="${product.name}">Product</p>
                    <p class="text-sm text-stone-500" th:text="${product.category}">Category</p>
                    <p class="text-xs text-stone-400 mt-0.5">Qty: <span th:text="${quantity}">1</span></p>
                </div>
            </div>

            <div class="divide-y divide-stone-100 text-sm">
                <div class="flex justify-between py-2.5 text-stone-600">
                    <span>Unit Price</span>
                    <span class="font-semibold">₹<span th:text="${#numbers.formatDecimal(product.price,0,'COMMA',2,'POINT')}">0</span></span>
                </div>
                <div class="flex justify-between py-2.5 text-stone-600">
                    <span>Quantity</span>
                    <span class="font-semibold" th:text="${quantity}">1</span>
                </div>
                <div class="flex justify-between py-2.5 text-stone-600">
                    <span>Subtotal</span>
                    <span class="font-semibold">₹<span th:text="${#numbers.formatDecimal(product.price * quantity,0,'COMMA',2,'POINT')}">0</span></span>
                </div>
                <div class="flex justify-between py-2.5 text-stone-500">
                    <span>GST (18%)</span>
                    <span>₹<span th:text="${#numbers.formatDecimal(product.price * quantity * 0.18,0,'COMMA',2,'POINT')}">0</span></span>
                </div>
                <div class="flex justify-between py-2.5 text-green-600 font-semibold">
                    <span>Delivery</span><span>FREE</span>
                </div>
                <div class="flex justify-between py-3 font-bold text-stone-800 text-base">
                    <span>Grand Total</span>
                    <span class="text-amber-700">₹<span th:text="${#numbers.formatDecimal(product.price * quantity * 1.18,0,'COMMA',2,'POINT')}">0</span></span>
                </div>
            </div>
        </div>

        <!-- SHIPPING FORM -->
        <div class="bg-white rounded-2xl shadow p-6">
            <h3 class="serif text-lg font-bold text-stone-800 mb-4">Shipping Details</h3>

            <form action="/user/place-order" method="post" class="space-y-4">
                <input type="hidden" name="productId" th:value="${product.id}">
                <input type="hidden" name="quantity" th:value="${quantity}">

                <div>
                    <label class="block text-stone-700 text-sm font-semibold mb-1">Full Name</label>
                    <input type="text" value="" th:value="${user.name}" readonly
                           class="w-full px-4 py-2.5 border border-stone-200 rounded-lg text-sm bg-stone-50 text-stone-600">
                </div>

                <div>
                    <label class="block text-stone-700 text-sm font-semibold mb-1">Phone Number *</label>
                    <input type="tel" name="phone" required placeholder="e.g. 9876543210"
                           class="w-full px-4 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>

                <div>
                    <label class="block text-stone-700 text-sm font-semibold mb-1">Street Address *</label>
                    <input type="text" name="address" required placeholder="House no., Street, Area"
                           class="w-full px-4 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1">City *</label>
                        <input type="text" name="city" required placeholder="e.g. Ahmedabad"
                               class="w-full px-4 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-stone-700 text-sm font-semibold mb-1">PIN Code *</label>
                        <input type="text" name="pincode" required placeholder="e.g. 380009" maxlength="6"
                               class="w-full px-4 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-amber-700 hover:bg-amber-800 text-white py-3.5 rounded-xl font-bold text-sm transition mt-2">
                    ✅ Place Order
                </button>
            </form>

            <a th:href="@{/user/product/{id}(id=${product.id})}"
               class="mt-3 block text-center text-stone-400 text-sm hover:text-amber-700 transition">
                ← Back to Product
            </a>
        </div>

    </div>
</div>
</body>
</html>
